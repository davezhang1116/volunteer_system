<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-600">Register</h1>
        </header>
        <main>
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                <p class="text-red-500 text-sm text-center">{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}
            <form method="post" class="space-y-4">
                <div>
                    <input type="text" name="name" placeholder="Name" required
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <input type="email" name="email" placeholder="Email" required
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <input type="password" name="password" placeholder="Password" required
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <select name="role" required
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="" disabled selected>Select Role</option>
                        <option value="volunteer">Volunteer</option>
                        <option value="doctor">Doctor / Researcher</option>
                        <option value="care_coordinator">Care Coordinator</option>
                        <option value="resident">Resident</option>
                    </select>
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Register</button>
            </form>
            <div class="mt-4 text-center">
                <a href="{{ url_for('admin') }}" class="text-blue-500 hover:underline text-sm">Back to Admin
                    Dashboard</a>
            </div>
            <div class="mt-2 text-center">
                <a href="{{ url_for('index') }}" class="text-blue-500 hover:underline text-sm">Back to Home</a>
            </div>
        </main>
    </div>
</body>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Find the form elements (using ID or name attributes)
        const roleSelect = document.getElementById('role') || document.querySelector('select[name="role"]');
        const emailInput = document.getElementById('email') || document.querySelector('input[name="email"]');
        const passwordInput = document.getElementById('password') || document.querySelector('input[name="password"]');

        // Find the parent div containers for email and password to hide the labels as well
        const emailContainer = emailInput ? emailInput.closest('div') : null;
        const passwordContainer = passwordInput ? passwordInput.closest('div') : null;

        function handleRoleChange() {
            if (roleSelect && roleSelect.value === 'resident') {
                // If resident is selected, remove required attributes and hide the fields
                if (emailInput) {
                    emailInput.required = false;
                    if (emailContainer) emailContainer.style.display = 'none';
                }
                if (passwordInput) {
                    passwordInput.required = false;
                    if (passwordContainer) passwordContainer.style.display = 'none';
                }
            } else {
                // For any other role, ensure fields are required and visible
                if (emailInput) {
                    emailInput.required = true;
                    if (emailContainer) emailContainer.style.display = 'block';
                }
                if (passwordInput) {
                    passwordInput.required = true;
                    if (passwordContainer) passwordContainer.style.display = 'block';
                }
            }
        }

        if (roleSelect) {
            roleSelect.addEventListener('change', handleRoleChange);
            handleRoleChange(); // Run on initial load in case it's already set
        }
    });
</script>

</html>
